{% extends 'base.html' %}
{% block title %}Password Reset Sent{% endblock %}
{% block auth_content %}
<div style="min-height:100vh;background:#042A4A;display:flex;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:12px;padding:40px;width:420px;max-width:95vw;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
    <i class="fas fa-envelope-open-text fa-3x mb-3" style="color:#042A4A;"></i>
    <h4 class="fw-bold">Check your email</h4>
    <p class="text-muted small">A password reset token has been sent to your email address.</p>
    <a href="{% url 'password_reset_confirm' %}" class="btn fw-bold text-white w-100 mt-2" style="background:#042A4A;">Enter Token</a>
    <div class="mt-3"><small><a href="{% url 'login' %}">Back to Login</a></small></div>
  </div>
</div>
{% endblock %}
