{% extends 'base.html' %}
{% block title %}Change Password{% endblock %}
{% block content %}
<h4 class="fw-bold mb-4">Change Password</h4>
<div class="card p-4" style="max-width:480px;">
  <form method="post">
    {% csrf_token %}
    {% for field in form %}
    <div class="mb-3">
      <label class="form-label small fw-semibold">{{ field.label }}</label>
      <input type="password" name="{{ field.html_name }}" class="form-control">
      {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors }}</div>{% endif %}
    </div>
    {% endfor %}
    <button type="submit" class="btn btn-primary">Update Password</button>
    <a href="{% url 'profile' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
  </form>
</div>
{% endblock %}
