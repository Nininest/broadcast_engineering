{% extends 'base.html' %}
{% block title %}Drafts{% endblock %}
{% block content %}
<h4 class="fw-bold mb-3">Drafts</h4>
<div class="row g-3">
  <div class="col-md-3"><div class="card p-2">
    <a href="{% url 'inbox' %}" class="btn btn-sm btn-outline-secondary w-100 mb-1">Inbox</a>
    <a href="{% url 'drafts' %}" class="btn btn-sm btn-primary w-100 mb-1">Drafts</a>
    <a href="{% url 'sent_messages' %}" class="btn btn-sm btn-outline-secondary w-100">Sent</a>
  </div></div>
  <div class="col-md-9"><div class="card p-2">
    {% for msg in msgs %}
    <a href="{% url 'view_message' msg.id %}" class="d-flex align-items-center gap-3 p-2 text-decoration-none border-bottom">
      <div class="flex-grow-1"><div class="small text-muted">To: {{ msg.recipient.get_full_name }}</div><div class="small fw-semibold">{{ msg.subject }}</div></div>
      <span class="badge bg-warning text-dark">Draft</span>
    </a>
    {% empty %}<div class="p-5 text-center text-muted">No drafts.</div>{% endfor %}
  </div></div>
</div>
{% endblock %}
