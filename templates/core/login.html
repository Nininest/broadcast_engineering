{% extends 'base.html' %}
{% block auth_content %}
<div style="min-height:100vh; background: linear-gradient(135deg, #042A4A 50%, #084070 100%); display:flex; align-items:center; justify-content:center;">
  <div style="display:flex; width:860px; max-width:95vw; border-radius:16px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,0.3);">
    <div style="flex:1; background:rgba(255,255,255,0.07); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:48px 32px; color:#fff;">
      <i class="fas fa-broadcast-tower" style="font-size:3rem; margin-bottom:16px; opacity:0.9;"></i>
      <h1 style="font-size:2rem; font-weight:800; letter-spacing:2px; margin:0;">BROADCAST</h1>
      <h2 style="font-size:1rem; font-weight:400; letter-spacing:4px; opacity:0.7; margin:4px 0 0;">ENGINEERING TEAMS</h2>
    </div>
    <div style="flex:1; background:#fff; padding:48px 40px;">
      <h3 style="font-weight:700; color:#042A4A; margin-bottom:8px;">SIGN IN</h3>
      <p class="text-muted small mb-4">Welcome back. Please enter your credentials.</p>
      {% if messages %}
        {% for msg in messages %}
        <div class="alert alert-danger py-2">{{ msg }}</div>
        {% endfor %}
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label small fw-semibold">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Enter username" required>
        </div>
        <div class="mb-3">
          <label class="form-label small fw-semibold">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-dark w-100 py-2 fw-bold" style="background:#042A4A;">SIGN IN TO PORTAL</button>
      </form>
      <div class="text-center mt-4">
        <small class="text-muted">New to Broadcast Engineering Teams? <a href="{% url 'register' %}">Sign Up</a></small>
      </div>
    </div>
  </div>
</div>
{% endblock %}
